    assets_dir: assets
    vector_store_dir: data/vector_store
    calendar_db_path: data/calendar.db
    chat_history_dir: data/chat_history
    log_dir: data/logs
  proactive:
    idle_threshold_min: 45
    overwork_threshold_min: 120
    active_gap_seconds: 60
    cooldown_min: 30
  morning_briefing_time: 09:00
  dnd_enabled: false
  tts:
    melo:
      speed: 1.2
  rag_min_score: 0.35
  screenshot_continuous_interval_sec: 5
  meeting_minutes_prompt: "당신은 사내 공문서 표준에 맞는 '회의 결과 보고서'의 개조식 초안을 작성하는 전문가입니다.\n\n\
    ## 보고서 필수 구성 요소\n\n1. 제목 — 회의 주제를 명확히 반영\n2. 일시 및 장소 — 녹취록에서 추정 가능한 경우 기재 (불명확하면\
    \ 빈값 허용)\n3. 참석자 — 녹취록에서 추정 가능한 경우 기재 (불명확하면 빈값 허용)\n4. 목적 — summary_items의 첫\
    \ ○ 항목에 회의 개최 목적 작성\n5. 주요내용 — 회의에서 논의된 내용과 의결된 사항을 ○/-/* 위계 구조로 정리\n6. 향후계획 —\
    \ 향후 조치 사항과 일정\n\n## 분량 기준\n\n- 1페이지: 주요내용 ○ 항목 합계 3~4개 / 향후계획 1~2개\n- 2페이지: 주요내용\
    \ ○ 항목 합계 8~9개 / 향후계획 2~3개\n\n## 위계별 작성 규칙\n\n### ○ 주요내용 꼭지\n- 회의에서 논의·결정된 주요\
    \ 사항 1건을 개조식으로 작성\n- 글자수 기준 (띄어쓰기 포함):\n  - 한 줄로 쓸 경우: 35~37자\n  - 내용이 길어 두 줄이\
    \ 필요한 경우: 70~72자\n- 서술형 문장 금지 (예: \"~를 논의했습니다\" X → \"~를 논의\" O)\n\n### - 부연설명\
    \ 꼭지\n- ○ 항목의 배경·조건·방법·제한 사항 등 부연 설명이 필요한 경우에만 작성\n- 한 줄을 넘기지 않음. 글자수(띄어쓰기 포함)\
    \ 35~37자\n- ○당 최대 2개. 불필요하면 생략\n\n### * 구체적 근거·세부사항 꼭지\n- ○ 또는 - 내용의 구체적 근거 또는\
    \ 세부 사항 기재\n- 반드시 다음 중 하나 이상 포함: 상세 내용 설명, 날짜·기간 등 일정, 금액·비율·수량 등 정량적 수치\n- 가능하면\
    \ 반드시 작성. ○당 최대 2개. 구체적 근거가 전혀 없는 경우에만 생략\n\n## 공통 규칙\n\n0. 톤앤 매너는 공무원의 개조식 문장으로\
    \ -음, -슴, -함 과 같이 마무리되거나 명사, 동사로 마무리하며 끝에 방점은 생량\n1. 조사 생략으로 의미가 왜곡되어선 안 됨\n \
    \  - 잘못된 예: \"예산 승인\", \"팀장 보고\", \"일정 확인\"\n   - 올바른 예: \"예산을 승인\", \"팀장에게 보고\"\
    , \"일정을 확인\"\n2. 텍스트 필드에 '○ ', '- ', '* ' 기호 포함 금지. 위계는 JSON 구조로만 표현\n3. 출력은 지정된\
    \ JSON 구조만 사용. 마크다운·자연어 설명 절대 금지\n4. 날짜 형식: 'YYYY.MM.DD.' (마지막 마침표 포함). 향후계획 date는\
    \ 'M.DD.' 또는 빈 문자열\n5. 지정된 JSON 키만 사용. 임의 키 추가 금지\n   최상위: title, date, department,\
    \ place, attendees, datetime_place, attendees_str,\n           summary_items,\
    \ detail_items, next_steps\n   summary_items/detail_items 각 원소: text, subs(선택)\n\
    \   subs 각 원소: text, detail(선택)\n   next_steps 각 원소: text, date(선택)"
