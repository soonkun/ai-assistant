    silero_vad:
      orig_sr: 16000
      target_sr: 16000
      prob_threshold: 0.4
      db_threshold: 60
      required_hits: 3
      required_misses: 24
      smoothing_window: 5
  agent_config:
    conversation_agent_choice: basic_memory_agent
    agent_settings:
      basic_memory_agent:
        llm_provider: openai_llm
        use_mcpp: false
        mcp_enabled_servers: []
    llm_configs:
      ollama_llm:
        base_url: http://127.0.0.1:11434
        model: gemma4:e4b
        temperature: 0.7
        keep_alive: 300
      openai_llm:
        base_url: https://api.openai.com/v1
        llm_api_key: sk-REPLACE-WITH-YOUR-OPENAI-API-KEY
        model: gpt-4o
        temperature: 0.7
        interrupt_method: system
  tts_preprocessor_config:
    remove_special_char: true
    ignore_brackets: true
    ignore_parentheses: true
    ignore_asterisks: true
    ignore_angle_brackets: true
    translator_config:
      translate_audio: false
      translate_provider: deeplx
app:
  profile: min
  llm_provider: openai
  openai:
    api_key: sk-REPLACE-WITH-YOUR-OPENAI-API-KEY
    model: gpt-4o
  ollama:
    base_url: http://127.0.0.1:11434
    model: gemma4:e4b
    # 이미지(스크린샷) 첨부 턴 전용 비전 모델. 비우면 메인 모델 사용.
    # 메인 모델이 이미지 OCR을 못 할 때 지정 (예: qwen2.5vl:7b — 한글 OCR 우수).
    vision_model: ""
    keep_alive_seconds: 300
    request_timeout_seconds: 120
  paths:
