npmRebuild: false
# 오프라인 원칙 (CLAUDE.md "외부 네트워크 호출 금지", §11.1)
# - publish: 자동 업데이트/원격 배포 경로 비활성. 사내 배포는 수동.
# - electronDownload.mirror: 기본 Electron 다운로드 미러 URL 제거.
#   빌드 머신의 기본 npm cache를 사용하며, 오프라인 번들 재생성은
#   scripts/bundle_deps.sh의 npm 캐시 블록을 통해 사내 mirror로 대체.
publish: null
